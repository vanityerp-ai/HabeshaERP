<!DOCTYPE html>
<html>
<head>
    <title>Clear Transaction Cache</title>
</head>
<body>
    <h1>Clear Transaction Cache</h1>
    <button onclick="clearCache()">Clear localStorage Cache</button>
    <div id="result"></div>

    <script>
        function clearCache() {
            // Clear transaction-related localStorage items
            const keys = Object.keys(localStorage);
            const transactionKeys = keys.filter(key => 
                key.includes('transaction') || 
                key.includes('Transaction') ||
                key.includes('TRANSACTION')
            );

            console.log('Found transaction keys:', transactionKeys);

            transactionKeys.forEach(key => {
                localStorage.removeItem(key);
                console.log('Removed:', key);
            });

            document.getElementById('result').innerHTML = 
                '<p style="color: green;">✅ Cleared ' + transactionKeys.length + ' transaction cache items</p>' +
                '<p>Keys removed: ' + transactionKeys.join(', ') + '</p>' +
                '<p>Please refresh the page to reload transactions from the API.</p>';
        }
    </script>
</body>
</html>
